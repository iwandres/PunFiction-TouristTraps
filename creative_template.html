<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rewarded Creative</title>
    <script type="text/javascript">
        var clickTag = "https://iwandres.github.io/PunFiction/boxofficeblunders/";
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111625;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            box-sizing: border-box;
        }
        .ad-container {
            border: 3px solid #06D6A0;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #06D6A0;
            max-width: 90%;
            width: 400px;
        }
        h1 {
            color: #06D6A0;
            margin-top: 0;
            font-size: 1.8rem;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            margin: 10px 0;
            color: #cbd5e1;
        }
        .btn {
            background-color: #ffde59;
            color: #2d3436;
            border: 3px solid #2d3436;
            box-shadow: 3px 3px 0px #2d3436;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #2d3436;
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <h1>🎬 TEST REWARDED AD</h1>
        <p>This is a custom test creative serving from Google Ad Manager.</p>
        <p>Click the button below to simulate completing the video and granting the reward!</p>
        <button class="btn" onclick="grantReward()">Claim Reward</button>
    </div>

    <script>
        // Google Ad Manager SDK or web postMessage communications
        function grantReward() {
            console.log("Simulating rewarded video complete event...");
            // If running inside Google's safeframe/iframe, send postMessage back
            if (window.parent && window.parent.postMessage) {
                window.parent.postMessage('rewarded-ad-complete', '*');
            }
        }
    </script>
</body>
</html>
